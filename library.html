<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1>Library</h1>

      <div class="sort-wrap">
        <label for="library-sort-select">Sort</label>
        <select id="library-sort-select">
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="count-desc">Most media</option>
          <option value="count-asc">Least media</option>
        </select>
      </div>
    </header>

    <section id="library-grid" class="library-grid"></section>
  </main>

  <script src="library.js"></script>
</body>
</html>
