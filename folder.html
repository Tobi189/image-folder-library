<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="back-btn" href="library.html">← Back</a>

      <div class="folder-header-text">
        <h1 id="page-title">Folder</h1>
      </div>

      <div class="sort-wrap">
        <label for="sort-select">Sort</label>
        <select id="sort-select">
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="date-asc">Date old-new</option>
          <option value="date-desc">Date new-old</option>
        </select>
      </div>
    </header>

    <section id="image-grid" class="image-grid"></section>
  </main>

  <div id="folderViewer" class="folder-viewer hidden">
    <div class="folder-viewer-topbar">
      <div id="folderViewerCounter" class="folder-viewer-counter">1 / 1</div>

      <div class="folder-viewer-controls">
        <button id="folderSlideshowToggle" class="folder-viewer-btn" type="button">Play</button>
        <button id="folderZoomOut" class="folder-viewer-btn" type="button">−</button>
        <button id="folderZoomIn" class="folder-viewer-btn" type="button">+</button>
        <button id="folderZoomReset" class="folder-viewer-btn" type="button">Reset</button>
        <button id="folderViewerClose" class="folder-viewer-btn" type="button">✕</button>
      </div>
    </div>

    <button id="folderViewerPrev" class="folder-viewer-nav folder-viewer-prev" type="button">‹</button>

    <div class="folder-viewer-stage">
      <img id="folderViewerImage" class="folder-viewer-image hidden" src="" alt="">
      <video
        id="folderViewerVideo"
        class="folder-viewer-video hidden"
        controls
        playsinline
        preload="metadata"
      ></video>
    </div>

    <button id="folderViewerNext" class="folder-viewer-nav folder-viewer-next" type="button">›</button>
  </div>

  <script src="./folder.js"></script>
</body>
</html>
